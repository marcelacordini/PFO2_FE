<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Utilizado — Lumina Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
      padding: 2rem 1.5rem 4rem;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    a.back {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    a.back:hover { text-decoration: underline; }
    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .meta {
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    pre {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
      overflow-x: auto;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="back">← Volver a la portada</a>
    <h1>Prompt exacto utilizado</h1>
    <p class="meta">Diseñado según Anthropic Prompt Engineering Guide y OpenAI Prompt Engineering Guide</p>
    <pre id="prompt-content">Cargando...</pre>
  </div>
  <script>
    fetch('PROMPT.txt')
      .then(r => r.text())
      .then(text => { document.getElementById('prompt-content').textContent = text; })
      .catch(() => { document.getElementById('prompt-content').textContent = 'Error al cargar PROMPT.txt'; });
  </script>
</body>
</html>
